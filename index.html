<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-eval'; img-src 'self' data: blob:;" />
  <title>Cellular Playground</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- Main Layout -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <!-- Logo / Title -->
      <div id="sidebar-header">
        <h1>Cellular<span>Playground</span></h1>
      </div>

      <!-- Tools Section -->
      <section class="panel">
        <div class="panel-title">Tools</div>
        <div class="toolbar-grid">
          <button class="tool-btn active" data-tool="draw" title="Draw (D)">
            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>
          <button class="tool-btn" data-tool="erase" title="Erase (E)">
            <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83l5.98 5.98c.78.78 2.05.78 2.83 0L22.27 12.7c.39-.39.59-.91.59-1.42 0-.55-.22-1.08-.59-1.45L16.56 3.59C16.17 3.2 15.65 3 15.14 3zM8 20l-4-4 7-7 4 4-7 7z"/></svg>
          </button>
          <button class="tool-btn" data-tool="pick" title="Pick Color (P)">
            <svg viewBox="0 0 24 24"><path d="M17.66 7.93L12 2.27 6.34 7.93c-3.12 3.12-3.12 8.19 0 11.31C7.9 20.8 9.95 21.58 12 21.58c2.05 0 4.1-.78 5.66-2.34 3.12-3.12 3.12-8.19 0-11.31zM12 19.37c-1.17 0-2.34-.45-3.23-1.34-1.78-1.78-1.78-4.68 0-6.46L12 8.23l3.23 3.34c1.78 1.78 1.78 4.68 0 6.46-.89.89-2.06 1.34-3.23 1.34z"/></svg>
          </button>
          <button class="tool-btn" data-tool="move" title="Pan (H)">
            <svg viewBox="0 0 24 24"><path d="M23 20v-8.01h-2v5.59L5.41 2 4 3.41 17.59 17H12v-2l-4 3 4 3v-2h7c1.1 0 2-.9 2-2zM4 10H2v7c0 1.1.9 2 2 2h7v-2H4v-7z"/></svg>
          </button>
        </div>
        <div class="tool-options">
          <label>Brush Size</label>
          <div class="brush-row">
            <input type="range" id="brushSize" min="1" max="20" value="3" />
            <span id="brushSizeLabel">3</span>
          </div>
          <label>Brush Shape</label>
          <select id="brushShape">
            <option value="square">Square</option>
            <option value="circle">Circle</option>
          </select>
        </div>
      </section>

      <!-- Color Section -->
      <section class="panel">
        <div class="panel-title">Colors</div>
        <div class="color-palette" id="colorPalette"></div>
        <div class="custom-color-row">
          <input type="color" id="customColor" value="#ff6b6b" />
          <button id="addColorBtn">+ Add</button>
        </div>
      </section>

      <!-- Simulation Controls -->
      <section class="panel">
        <div class="panel-title">Simulation</div>
        <div class="sim-controls">
          <button id="playBtn" class="sim-btn" title="Play/Pause (Space)">▶</button>
          <button id="stepBtn" class="sim-btn" title="Step (Right Arrow)">⏭</button>
          <button id="resetBtn" class="sim-btn" title="Reset">⟳</button>
          <button id="randomBtn" class="sim-btn" title="Randomize (Cmd+R)">🎲</button>
          <button id="clearBtn" class="sim-btn" title="Clear (Cmd+Del)">✕</button>
        </div>
        <div class="sim-options">
          <label>Speed</label>
          <input type="range" id="speedControl" min="1" max="30" value="10" />
          <label>
            <input type="checkbox" id="wrapToggle" checked />
            Wrap (Torus)
          </label>
        </div>
      </section>

      <!-- Rule Selection -->
      <section class="panel">
        <div class="panel-title">Rules</div>
        <select id="ruleSelect" class="rule-select"></select>
        <div class="rule-display" id="ruleDisplay"></div>
        <div class="rule-actions">
          <button id="editRuleBtn" class="panel-btn">✏️ Edit Rules</button>
          <button id="newRuleBtn" class="panel-btn">+ New Rule</button>
        </div>
      </section>

      <!-- Pattern Library -->
      <section class="panel">
        <div class="panel-title">Patterns</div>
        <div class="pattern-grid" id="patternGrid"></div>
      </section>
    </aside>

    <!-- Main Canvas Area -->
    <main id="main-area">
      <div id="canvas-container">
        <canvas id="gridCanvas"></canvas>
        <div id="zoom-indicator">100%</div>
        <div id="coord-indicator"></div>
      </div>
    </main>

    <!-- Rule Editor Modal -->
    <div id="ruleEditorModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Rule Editor</h2>
          <button id="closeRuleEditor" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="rule-editor-layout">
            <div class="rule-editor-sidebar">
              <div class="form-group">
                <label>Rule Name</label>
                <input type="text" id="ruleName" placeholder="My Rule" />
              </div>
              <div class="form-group">
                <label>Rule Type</label>
                <select id="ruleType">
                  <option value="bspace">B/S Notation</option>
                  <option value="generations">Generations</option>
                  <option value="visual">Visual (CellPond Style)</option>
                </select>
              </div>
              <div id="bspaceOptions" class="form-group">
                <label>Birth (B)</label>
                <input type="text" id="birthInput" placeholder="e.g. 3" />
                <label>Survive (S)</label>
                <input type="text" id="surviveInput" placeholder="e.g. 23" />
                <label>Neighborhood</label>
                <select id="neighborhoodSelect">
                  <option value="moore">Moore (8 neighbors)</option>
                  <option value="von-neumann">Von Neumann (4 neighbors)</option>
                </select>
                <label>States</label>
                <input type="number" id="statesInput" min="2" max="256" value="2" />
              </div>
              <div id="visualOptions" class="form-group hidden">
                <p class="hint">Visual rules use LHS → RHS patterns. Drag cells from the palette to define rules.</p>
                <button id="addPaddleBtn" class="panel-btn">+ Add Paddle</button>
              </div>
              <div class="form-actions">
                <button id="saveRuleBtn" class="primary-btn">Save Rule</button>
                <button id="deleteRuleBtn" class="danger-btn">Delete</button>
              </div>
            </div>
            <div class="rule-editor-canvas-area">
              <canvas id="ruleEditorCanvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Overlay -->
    <div id="modalOverlay" class="modal-overlay hidden"></div>
  </div>

  <!-- Scripts -->
  <script src="js/engine/grid.js"></script>
  <script src="js/engine/rules.js"></script>
  <script src="js/engine/simulation.js"></script>
  <script src="js/patterns/library.js"></script>
  <script src="js/ui/canvas.js"></script>
  <script src="js/ui/toolbar.js"></script>
  <script src="js/ui/patterns.js"></script>
  <script src="js/ui/rule-editor.js"></script>
  <script src="js/storage/save-load.js"></script>
  <script src="js/renderer.js"></script>
</body>
</html>
